animations = true;
animation-stiffness = 250;       
animation-window-mass = 0.4;     
animation-dampening = 20;
animation-clamping = true;
animation-for-open-window = "zoom";      
animation-for-unmap-window = "squeeze";  
animation-for-transient-window = "slide-up";

corner-radius = 10;              
round-borders = 1;
detect-rounded-corners = true;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

inactive-opacity = 0.85;
active-opacity = 0.95;
frame-opacity = 0.9;
inactive-opacity-override = false;

opacity-rule = [
    "90:class_g = 'zen'",
    "100:class_g = 'Polybar'",
    "100:class_g = 'Rofi'",
    "95:class_g = 'TelegramDesktop'" 
];

blur: {
    method = "dual_kawase";
    strength = 6;
    background = true;
    background-frame = false;
    background-fixed = false;
    kern = "3x3box";
}

shadow = true;                   
shadow-radius = 18;
shadow-opacity = 0.40;           
shadow-offset-x = -15;           
shadow-offset-y = -15;           
shadow-color = "#000000";

fading = true;           
fade-in-step = 0.03;     
fade-out-step = 0.03;    
fade-delta = 5;          
no-fading-openclose = false; 

backend = "glx";
vsync = true;
use-damage = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
log-level = "warn";


wintypes: {
    normal = { fade = true; shadow = true; blur-background = true; };
    tooltip = { fade = true; shadow = false; opacity = 0.9; focus = true; };
    popup_menu = { opacity = 0.95; blur-background = true; };
    dropdown_menu = { opacity = 0.95; blur-background = true; };
    dnd = { shadow = false; };
};

shadow-exclude = [
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c"   
];

fade-exclude = [
    "class_g = 'slop'"
];

blur-background-exclude = [
    "class_g = 'slop'",
    "window_type = 'dock'",      
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

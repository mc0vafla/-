background              #282828
foreground              #d8d8d8
selection_foreground    #282828
selection_background    #d8d8d8
active_border_color     #8a9a8a
inactive_border_color   #4a4a4a

window_padding_width      15
tab_bar_style             powerline
active_tab_foreground     #282828
active_tab_background     #8a9a8a
inactive_tab_foreground   #d8d8d8
inactive_tab_background   #282828

cursor                    #d8d8d8
cursor_text_color         #282828
cursor_shape              beam
cursor_trail              3
cursor_trail_decay        0.1 0.4
url_color                 #6a8a9a

color0  #282828
color1  #cc5a5a
color2  #8a9a8a
color3  #d7b56d
color4  #6a8a9a
color5  #9a6a8a
color6  #6a9a9a
color7  #d8d8d8

color8  #4a4a4a
color9  #d77a7a
color10 #aab7aa
color11 #e7c57d
color12 #7aa7b7
color13 #aa7a9a
color14 #7aa7a7
color15 #e8e8e8

background_opacity        0.90
background_blur           20
repaint_delay             8
input_delay               2
sync_to_monitor           yes
confirm_os_window_close   0
allow_remote_control      yes
listen_on                 unix:/tmp/mykitty
remember_window_size      yes
wayland_titlebar_color    background

enabled_layouts splits,stack,fat,tall
map ctrl+shift+i launch --location=hsplit
map ctrl+shift+u launch --location=vsplit
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down
